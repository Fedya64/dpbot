[build]
builder = "nixpacks"

[build.nixpacks]
python_version = "3.11"
providers = ["python"]
aptPkgs = [
  "libglib2.0-0",
  "libglib2.0-dev",
  "libnss3",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libxkbcommon0",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libpango-1.0-0",
  "libpangocairo-1.0-0",
  "libasound2",
  "libx11-xcb1"
]

[deploy]
start = "python bot.py"
